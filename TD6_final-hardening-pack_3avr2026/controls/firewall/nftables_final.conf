#!/usr/sbin/nft -f
# nftables_final.conf — gw-fw (10.10.10.1)
# Durcissement TD2 — Kara Eliza — mars 2026
# Appliqué avec : nft -f /etc/nftables.conf
# Persistant via : systemctl enable nftables

flush ruleset

define LAN_NET  = 10.10.10.0/24
define DMZ_NET  = 10.10.20.0/24
define IPSEC_PEER = 10.10.99.2

table inet filter {

    chain input {
        type filter hook input priority 0; policy drop;

        # Loopback toujours autorisé
        iifname "lo" accept

        # Connexions établies / liées
        ct state established,related accept

        # ICMP (ping) limité
        ip protocol icmp  limit rate 10/second accept
        ip6 nexthdr icmpv6 limit rate 10/second accept

        # SSH depuis LAN uniquement
        iifname "eth1" ip saddr $LAN_NET tcp dport 22 ct state new accept

        # IKE / NAT-T pour IPsec
        udp dport { 500, 4500 } accept

        # ESP
        ip protocol esp accept

        # Tout le reste : drop (log optionnel)
        log prefix "[nft-input-drop] " flags all counter drop
    }

    chain forward {
        type filter hook forward priority 0; policy drop;

        # Trafic établi / lié
        ct state established,related accept

        # LAN → DMZ : HTTPS uniquement (port 8443)
        iifname "eth1" oifname "eth2" ip saddr $LAN_NET ip daddr $DMZ_NET \
            tcp dport 8443 ct state new accept

        # LAN → DMZ : SSH (administration)
        iifname "eth1" oifname "eth2" ip saddr $LAN_NET ip daddr $DMZ_NET \
            tcp dport 22 ct state new accept

        # DMZ → LAN : bloqué explicitement (pas de retour initié depuis DMZ)
        iifname "eth2" oifname "eth1" drop

        # Trafic IPsec décapsulé (entre les deux sites)
        iifname "eth3" oifname "eth2" ip saddr $LAN_NET ip daddr $DMZ_NET accept
        iifname "eth2" oifname "eth3" ip saddr $DMZ_NET ip daddr $LAN_NET accept

        log prefix "[nft-forward-drop] " flags all counter drop
    }

    chain output {
        type filter hook output priority 0; policy accept;
    }
}

table ip nat {
    chain postrouting {
        type nat hook postrouting priority srcnat; policy accept;
        oifname "eth0" masquerade
    }
}
