# nginx_final.conf — srv-web (10.10.20.10)
# Durcissement TLS — TD4 — Kara Eliza — mars 2026
# Appliqué dans /etc/nginx/sites-available/td4
# Activé : ln -s /etc/nginx/sites-available/td4 /etc/nginx/sites-enabled/

# Zone de rate limiting (déclarée dans le bloc http de nginx.conf)
# limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

server {
    listen 8443 ssl;
    server_name td4.local;

    # Certificat (auto-signé pour le TP) — même chemin que TD4
    ssl_certificate     /etc/nginx/certs/server.crt;
    ssl_certificate_key /etc/nginx/certs/server.key;

    # Protocoles : TLS 1.2 et 1.3 uniquement
    ssl_protocols TLSv1.2 TLSv1.3;

    # Suites cryptographiques modernes avec forward secrecy
    ssl_ciphers 'ECDHE+AESGCM:ECDHE+CHACHA20:!aNULL:!MD5:!RC4';
    ssl_prefer_server_ciphers on;

    # HSTS
    add_header Strict-Transport-Security "max-age=300" always;

    # Sessions TLS
    ssl_session_cache    shared:SSL:10m;
    ssl_session_timeout  5m;
    ssl_session_tickets  off;

    # Filtrage basique par User-Agent (bots de scan connus)
    if ($http_user_agent ~* "sqlmap|nikto|dirbuster") {
        return 403;
    }

    location /api {
        limit_req zone=api_limit burst=5 nodelay;
        return 200 "API response\n";
    }

    location / {
        return 200 "TLS lab endpoint hardened\n";
    }

    # Logs
    access_log /var/log/nginx/td4_access.log;
    error_log  /var/log/nginx/td4_error.log;
}
