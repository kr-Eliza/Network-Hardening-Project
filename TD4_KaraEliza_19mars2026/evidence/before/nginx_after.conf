# Note: this file is misnamed in the evidence/before folder.
# It corresponds to the nginx configuration ACTIVE at the time of the baseline audit.
# The filename was generated by the evidence collection script before the hardening phase.

server {
    listen 8443 ssl;
    server_name td4.local;

    ssl_certificate /etc/nginx/certs/server.crt;
    ssl_certificate_key /etc/nginx/certs/server.key;

    # Weak baseline TLS configuration (intentional for lab)
    ssl_protocols TLSv1 TLSv1.1 TLSv1.2;
    ssl_ciphers HIGH:MEDIUM:!aNULL;

    location / {
        return 200 "TLS lab endpoint\n";
    }
}
